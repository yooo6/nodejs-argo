<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>赛博精神病院</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* 背景闪烁 */
.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,#ff00801f,transparent 25%),
    radial-gradient(circle at 80% 30%,#00ffee22,transparent 25%),
    radial-gradient(circle at 50% 80%,#ffff0022,transparent 25%);
    animation:bgmove 8s linear infinite;
}

@keyframes bgmove{
    0%{transform:scale(1) rotate(0)}
    50%{transform:scale(1.1) rotate(2deg)}
    100%{transform:scale(1) rotate(0)}
}

/* 主卡片 */
.box{
    width:360px;
    padding:35px 28px;
    border-radius:24px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
    position:relative;
    z-index:2;
}

h1{
    font-size:32px;
    margin-bottom:12px;
}

.desc{
    color:#cbd5e1;
    line-height:1.7;
    font-size:15px;
    margin-bottom:24px;
}

/* 按钮 */
button{
    border:none;
    margin:5px;
    padding:12px 18px;
    border-radius:999px;
    cursor:pointer;
    font-weight:bold;
    transition:.15s;
}

.btn1{
    background:#22c55e;
    color:#111;
}

.btn2{
    background:#f43f5e;
    color:white;
}

button:hover{
    transform:scale(1.08);
}

/* 输出 */
#screen{
    margin-top:22px;
    min-height:120px;
    padding:18px;
    border-radius:18px;
    background:rgba(0,0,0,.25);
    color:#facc15;
    line-height:1.8;
    font-size:15px;
    overflow:hidden;
}

/* 摇晃 */
.shake{
    animation:shake .22s;
}

@keyframes shake{
    0%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    50%{transform:translateX(8px)}
    75%{transform:translateX(-5px)}
    100%{transform:translateX(0)}
}

/* 漂浮弹幕 */
.fly{
    position:absolute;
    font-size:24px;
    pointer-events:none;
    animation:fly 4s linear forwards;
}

@keyframes fly{
    from{
        transform:translateY(0) rotate(0);
        opacity:1;
    }
    to{
        transform:translateY(-260px) rotate(720deg);
        opacity:0;
    }
}

/* 蓝屏 */
.bsod{
    position:fixed;
    inset:0;
    background:#0011aa;
    color:white;
    z-index:999;
    display:none;
    padding:40px;
    font-size:18px;
    line-height:2;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="box" id="box">

    <h1>🧠 赛博精神病院</h1>

    <div class="desc">
        本网站由熬夜、外卖和工资焦虑驱动。<br>
        点击按钮接受互联网制裁。
    </div>

    <button class="btn1" onclick="diagnose()">
        AI诊断我
    </button>

    <button class="btn2" onclick="destroy()">
        一键发疯
    </button>

    <div id="screen">
        系统状态：勉强活着
    </div>

</div>

<!-- 蓝屏 -->
<div class="bsod" id="bsod">
    <h1>: (</h1>

    <p>
        你的大脑遇到问题并需要重新启动。<br>
        错误代码：<br><br>

        DRIVER_TOO_MUCH_WORK<br>
        OVERTHINKING_EXCEPTION<br>
        LOW_SALARY_FATAL_ERROR
    </p>

    <br>

    <p>
        收集到 100% 焦虑后将自动重启人生...
    </p>
</div>

<script>

const results = [
"AI检测：你已经连续摸鱼 6 小时，建议继续保持。",
"系统分析：你老板正在假装很忙。",
"检测到你今天第 9 次打开招聘软件。",
"你的银行卡余额对你使用了沉默术。",
"AI判断：你适合当老板，因为你根本不想上班。",
"系统提示：今天努力工作的人已经后悔了。",
"你的精神状态领先全球 20 年。",
"检测完成：建议立刻奖励自己炸鸡奶茶。"
];

function diagnose(){

    const text =
    results[Math.floor(Math.random()*results.length)];

    document.getElementById("screen").innerHTML =
    "🧪 AI诊断结果：<br><br>" + text;

    shake();

    spam("🐟");
}

function destroy(){

    shake();

    spam("💀");

    document.getElementById("screen").innerHTML =
    "正在释放互联网负能量...";

    setTimeout(()=>{

        document.getElementById("bsod").style.display="block";

    },1200);

    setTimeout(()=>{

        document.getElementById("bsod").style.display="none";

        document.getElementById("screen").innerHTML =
        "系统已恢复。<br>但你的工资没有恢复。";

    },5000);
}

function shake(){

    const box=document.getElementById("box");

    box.classList.add("shake");

    setTimeout(()=>{
        box.classList.remove("shake");
    },220);
}

/* 漂浮 emoji */
function spam(icon){

    for(let i=0;i<12;i++){

        const e=document.createElement("div");

        e.className="fly";

        e.innerText=icon;

        e.style.left=Math.random()*100+"vw";

        e.style.top=(window.innerHeight-100)+"px";

        e.style.fontSize=
        (Math.random()*26+18)+"px";

        document.body.appendChild(e);

        setTimeout(()=>{
            e.remove();
        },4000);
    }
}

/* 自动随机弹一句 */
setInterval(()=>{

    const tips=[
        "老板正在靠近...",
        "你的外卖还有 52 分钟送达",
        "工资：未响应",
        "检测到一只野生打工人",
        "你已进入摆烂模式"
    ];

    document.title =
    tips[Math.floor(Math.random()*tips.length)];

},2500);

</script>

</body>
</html>
